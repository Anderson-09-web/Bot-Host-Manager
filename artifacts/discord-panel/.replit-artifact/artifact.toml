kind = "web"
previewPath = "/"
title = "Discord Bot Hosting Panel"
version = "1.0.0"
id = "artifacts/discord-panel"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21896

[services.development]
run = "pnpm --filter @workspace/discord-panel run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/discord-panel", "run", "build" ]
serve = "static"
publicDir = "artifacts/discord-panel/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21896"
BASE_PATH = "/"
